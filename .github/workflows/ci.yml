name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      # --ignore-scripts skips electron's postinstall which downloads
      # the ~100 MB Electron binary from GitHub Releases — flaky on
      # CI and unnecessary for typecheck-only validation. The release
      # workflow does the full install.
      - name: Install (no scripts)
        run: npm ci --no-audit --no-fund --ignore-scripts
      - name: Typecheck
        run: npm run typecheck
      - name: Build renderer + main (skips needing electron binary)
        run: npx electron-vite build
